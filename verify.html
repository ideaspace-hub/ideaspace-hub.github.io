<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Email Verification - CollabSpace</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }
    #message {
      font-size: 1.2em;
      margin-top: 20px;
      color: #333;
    }
  </style>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>
  <h1>CollabSpace Email Verification</h1>
  <p id="message">Verifying your email, please wait...</p>

  <script>
    // Your Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBbTWt0dpw7w6mFJB2yF0olTCh2mBDwbn8",
      authDomain: "collabspace-6d0af.firebaseapp.com",
      projectId: "collabspace-6d0af",
      storageBucket: "collabspace-6d0af.firebasestorage.app",
      messagingSenderId: "19918134739",
      appId: "1:19918134739:web:3c3e2046024466dd2ea326",
      measurementId: "G-31K3YSWDYP"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Get URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const oobCode = urlParams.get('oobCode');

    if (mode === 'verifyEmail' && oobCode) {
      auth.applyActionCode(oobCode)
        .then(() => {
          document.getElementById('message').textContent = "✅ Your email has been verified successfully!";
        })
        .catch((error) => {
          document.getElementById('message').textContent = "❌ Verification failed: " + error.message;
        });
    } else {
      document.getElementById('message').textContent = "⚠️ Invalid verification link.";
    }
  </script>
</body>
</html>
